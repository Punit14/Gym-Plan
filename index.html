<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Punit's Gym Plan</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json"/>
<meta name="theme-color" content="#FF6B35"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Gym Plan"/>
<link rel="apple-touch-icon" href="./icons/icon-192.png"/>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080810;
    --card: #10101e;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f8;
    --muted: rgba(240,240,248,0.45);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: -webkit-fill-available; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior-y: none;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0d0d20 0%, #131330 60%, #0d1a3a 100%);
    padding: max(40px, calc(var(--safe-top) + 22px)) 20px 28px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content:''; position:absolute; top:-60px; right:-60px;
    width:260px; height:260px;
    background: radial-gradient(circle, rgba(255,107,53,0.18) 0%, transparent 70%);
    border-radius:50%;
  }
  .header::after {
    content:''; position:absolute; bottom:-40px; left:-40px;
    width:200px; height:200px;
    background: radial-gradient(circle, rgba(78,205,196,0.15) 0%, transparent 70%);
    border-radius:50%;
  }
  .header-label { font-size:11px; letter-spacing:4px; color:#FF6B35; text-transform:uppercase; font-weight:700; margin-bottom:10px; }
  .header h1 { font-family:'Bebas Neue', sans-serif; font-size:clamp(40px,8vw,64px); line-height:1; letter-spacing:2px; }
  .header h1 span { color:#FF6B35; }
  .header p { color:var(--muted); font-size:14px; margin-top:10px; }

  /* DAY TABS — sticky with glass blur */
  .tabs {
    display:flex; overflow-x:auto; gap:8px;
    padding:14px 16px;
    scrollbar-width:none;
    border-bottom:1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,8,16,0.82);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
  }
  .tabs::-webkit-scrollbar { display:none; }
  .tab {
    flex-shrink:0; padding:10px 14px; border-radius:14px; border:2px solid var(--border);
    background:rgba(255,255,255,0.04); color:var(--muted); cursor:pointer;
    font-family:'DM Sans',sans-serif; font-weight:700; font-size:13px;
    text-align:center; min-width:72px; min-height:62px;
    transition:all 0.2s;
    -webkit-user-select:none; user-select:none;
  }
  .tab.active { color:var(--accent); border-color:var(--accent); background:rgba(var(--accent-rgb),0.12); }
  .tab-icon { font-size:20px; display:block; margin-bottom:3px; }

  /* DAY HERO */
  .day-hero {
    margin:18px 16px 0;
    border-radius:18px;
    padding:20px;
    border:1px solid rgba(var(--accent-rgb),0.3);
    background:linear-gradient(135deg, rgba(var(--accent-rgb),0.15) 0%, rgba(var(--accent-rgb),0.05) 100%);
    display:flex; justify-content:space-between; align-items:flex-start;
  }
  .day-tag { font-size:11px; color:var(--accent); font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:6px; }
  .day-title { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:1px; }
  .day-focus { color:var(--muted); font-size:14px; margin-top:3px; }
  .day-badge { background:var(--accent); color:#fff; border-radius:10px; padding:6px 12px; font-size:12px; font-weight:700; white-space:nowrap; }

  /* EXERCISE CARDS */
  .exercises { padding:12px 16px; display:flex; flex-direction:column; gap:10px; }
  .ex-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; overflow:hidden; cursor:pointer;
    transition:border-color 0.2s, background 0.2s;
    -webkit-user-select:none; user-select:none;
  }
  .ex-card.open { border-color:rgba(var(--accent-rgb),0.5); background:rgba(255,255,255,0.06); }
  .ex-header { padding:16px 16px; display:flex; align-items:center; justify-content:space-between; min-height:66px; }
  .ex-left { display:flex; align-items:center; gap:12px; flex:1; min-width:0; }
  .ex-num {
    width:36px; height:36px; border-radius:10px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:13px;
    background:rgba(var(--accent-rgb),0.18); color:var(--accent);
  }
  .ex-name-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .ex-name { font-weight:700; font-size:16px; line-height:1.3; }
  .copy-btn {
    background:rgba(var(--accent-rgb),0.15); border:none; border-radius:7px;
    padding:7px 8px; cursor:pointer; color:var(--accent);
    font-family:'DM Sans',sans-serif; flex-shrink:0;
    transition:background 0.2s, color 0.2s;
    min-width:34px; min-height:34px; display:flex; align-items:center; justify-content:center;
  }
  .copy-btn:active { background:rgba(var(--accent-rgb),0.3); }
  .copy-btn.copied { color:#4ECDC4; background:rgba(78,205,196,0.15); }
  .ex-meta { color:var(--muted); font-size:13px; margin-top:3px; }
  .ex-chevron { color:var(--accent); font-size:20px; transition:transform 0.25s; flex-shrink:0; margin-left:8px; }
  .ex-card.open .ex-chevron { transform:rotate(180deg); }

  /* EXPANDED CONTENT */
  .ex-body { display:none; padding:0 16px 16px; }
  .ex-card.open .ex-body { display:block; }
  .ex-divider { height:1px; background:rgba(var(--accent-rgb),0.2); margin-bottom:14px; }

  /* MEDIA THUMBNAIL STRIP */
  .media-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
    margin-top: 12px;
    margin-bottom: 0;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x mandatory;
  }
  .media-strip::-webkit-scrollbar { display: none; }

  .media-thumb {
    flex-shrink: 0;
    width: 88px;
    height: 88px;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid var(--border);
    scroll-snap-align: start;
    transition: transform 0.12s, border-color 0.15s;
  }
  .media-thumb:active { transform: scale(0.93); }
  .media-thumb img, .media-thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .media-thumb .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.38);
  }
  .play-icon-circle {
    width: 30px;
    height: 30px;
    background: rgba(255,255,255,0.92);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #111;
    padding-left: 2px;
  }
  .media-more-thumb {
    flex-shrink: 0;
    width: 88px;
    height: 88px;
    border-radius: 12px;
    border: 1.5px dashed var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: var(--muted);
    font-size: 22px;
    cursor: default;
  }
  .media-more-thumb span { font-size: 11px; font-weight: 700; letter-spacing: 1px; }

  .machine-block { border-radius:12px; overflow:hidden; margin-bottom:10px; }
  .machine-label {
    background:rgba(var(--accent-rgb),0.15); border-radius:12px;
    padding:12px 14px;
  }
  .machine-label-tag { font-size:10px; color:var(--accent); font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:3px; }
  .machine-label-name { font-size:14px; font-weight:700; }

  .tip-block {
    background:rgba(var(--accent-rgb),0.1);
    border-left:3px solid var(--accent);
    border-radius:0 10px 10px 0;
    padding:12px 14px;
  }
  .tip-tag { font-size:10px; color:var(--accent); font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:4px; }
  .tip-text { font-size:13px; color:rgba(240,240,248,0.75); line-height:1.65; }

  /* TIPS SECTION */
  .tips-section { padding:8px 16px 24px; }
  .tips-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; }
  .tips-title { font-size:11px; color:#FF6B35; font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:14px; }
  .tip-item { font-size:13px; color:var(--muted); padding:10px 12px; background:rgba(255,255,255,0.04); border-radius:8px; margin-bottom:6px; line-height:1.5; }

  .footer {
    text-align:center;
    padding:12px 16px;
    padding-bottom: max(28px, calc(var(--safe-bottom) + 14px));
    color:rgba(255,255,255,0.18);
    font-size:11px;
  }

  /* STRETCH SECTION */
  .stretch-section-header {
    margin: 4px 16px 0;
    padding: 14px 16px;
    border-radius: 14px;
    background: rgba(120,80,220,0.1);
    border: 1px solid rgba(120,80,220,0.25);
    display: flex; justify-content: space-between; align-items: center;
  }
  .stretch-header-tag { font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:#a78bfa; }
  .stretch-header-sub { font-size:12px; color:var(--muted); }
  .stretch-card .ex-num { background:rgba(120,80,220,0.18); color:#a78bfa; font-size:16px; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .day-content { animation: fadeIn 0.3s ease; }

  /* ─── LIGHTBOX ─── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
    overscroll-behavior: none;
  }
  .lightbox.active {
    opacity: 1;
    pointer-events: all;
  }
  .lightbox-media-wrap {
    max-width: 100%;
    max-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 72px 16px max(72px, calc(var(--safe-bottom) + 56px));
  }
  .lightbox-media-wrap img {
    max-width: calc(100vw - 32px);
    max-height: calc(100dvh - 144px);
    border-radius: 14px;
    object-fit: contain;
    display: none;
  }
  .lightbox-media-wrap video {
    max-width: calc(100vw - 32px);
    max-height: calc(100dvh - 144px);
    border-radius: 14px;
    display: none;
    background: #000;
  }
  .lightbox-close {
    position: fixed;
    top: max(18px, calc(var(--safe-top) + 10px));
    right: max(16px, var(--safe-right));
    width: 46px; height: 46px;
    background: rgba(255,255,255,0.13);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 50%;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10001;
    font-family: 'DM Sans', sans-serif; font-weight: 700;
    -webkit-user-select:none; user-select:none;
    transition: background 0.15s;
  }
  .lightbox-close:active { background: rgba(255,255,255,0.25); }
  .lightbox-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.13);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 50%;
    color: #fff;
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10001;
    -webkit-user-select:none; user-select:none;
    transition: background 0.15s;
  }
  .lightbox-nav:active { background: rgba(255,255,255,0.28); }
  .lightbox-prev { left: max(12px, var(--safe-left)); }
  .lightbox-next { right: max(12px, var(--safe-right)); }
  .lightbox-counter {
    position: fixed;
    bottom: max(28px, calc(var(--safe-bottom) + 16px));
    left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.82);
    font-size: 13px; font-weight: 600;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 7px 18px;
    border-radius: 20px;
    white-space: nowrap;
    z-index: 10001;
  }
  .lightbox-badge {
    position: fixed;
    top: max(18px, calc(var(--safe-top) + 10px));
    left: max(16px, var(--safe-left));
    font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 6px 12px;
    border-radius: 8px;
    z-index: 10001;
  }
  @keyframes lbPop { from{opacity:0;transform:scale(0.93)} to{opacity:1;transform:scale(1)} }
  .lb-anim { animation: lbPop 0.18s ease; }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Punit's Program</div>
  <h1>7-Day Full Body<br/><span>Gym Plan</span></h1>
  <p>60 min/day &nbsp;·&nbsp; Machine-based &nbsp;·&nbsp; Beginner friendly</p>
  <p id="header-date" style="color:var(--muted);font-size:13px;margin-top:6px;opacity:0.7;"></p>
</div>

<div class="tabs" id="tabs"></div>
<div id="content"></div>

<!-- Lightbox — lives outside #content so it survives re-renders -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-badge" id="lb-badge">📷 PHOTO</div>
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div class="lightbox-media-wrap" onclick="event.stopPropagation()">
    <img id="lb-img" alt="Exercise photo"/>
    <video id="lb-vid" controls playsinline></video>
  </div>
  <button class="lightbox-nav lightbox-prev" id="lb-prev" onclick="lightboxPrev(event)">‹</button>
  <button class="lightbox-nav lightbox-next" id="lb-next" onclick="lightboxNext(event)">›</button>
  <div class="lightbox-counter" id="lb-counter">1 / 1</div>
</div>

const tips = [
  "🥤 Drink water between every single set",

// Map JS getDay() (0=Sun … 6=Sat) → days array index (0=Mon … 6=Sun)
let activeDay = (new Date().getDay() + 6) % 7;

// Render today's date in the header

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

// ── Media / Lightbox state ─────────────────────────────────────────
let lightboxMedia = [];
let lightboxIndex = 0;
let lbTouchX = 0;

const MEDIA_MAX = 6;
// Persist probe results across page refreshes — zero network cost on repeat visits.
const mediaCache = (() => {
  try { return JSON.parse(sessionStorage.getItem('gymMediaCache') || '{}'); }
  catch { return {}; }
})();

function nameToSlug(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

// Returns the strip HTML. Already-probed exercises render inline; new ones
// get an invisible placeholder that fills in once HEAD probes complete.
function renderMediaStrip(exName) {
  const slug = nameToSlug(exName);
  const id = 'ms-' + slug;
  if (mediaCache[slug] !== undefined) return buildStripHTML(id, mediaCache[slug]);
  probeMedia(slug, id); // fires async, updates DOM when done
  return `<div class="media-strip" id="${id}" style="display:none;margin:0;"></div>`;
}

// Probes number-by-number (3 parallel per number), stops at the first empty batch.
// Worst case: MEDIA_MAX × 3 requests. Typical (no media): just 3 requests.
async function probeMedia(slug, id) {
  const found = [];
  const chk = src => fetch(src, { method: 'HEAD' }).then(r => r.ok ? src : null).catch(() => null);

  for (let i = 1; i <= MEDIA_MAX; i++) {
    const [jpg, mp4, mov] = await Promise.all([
      chk(`media/${slug}-${i}.jpg`),
      chk(`media/${slug}-${i}.mp4`),
      chk(`media/${slug}-${i}.mov`),
    ]);
    if (!jpg && !mp4 && !mov) break; // no file at this number — stop
    if (jpg) found.push({ type: 'image', src: jpg });
    if (mp4) found.push({ type: 'video', src: mp4 });
    if (mov) found.push({ type: 'video', src: mov });
  }

  mediaCache[slug] = found;
  try { sessionStorage.setItem('gymMediaCache', JSON.stringify(mediaCache)); } catch {}

  const strip = document.getElementById(id);
  if (!strip) return;
  if (!found.length) { strip.remove(); return; }
  strip.removeAttribute('style');
  strip.innerHTML = thumbsHTML(found);
}

function buildStripHTML(id, found) {
  if (!found.length) return '';
  return `<div class="media-strip" id="${id}">${thumbsHTML(found)}</div>`;
}

function thumbsHTML(items) {
  return items.map(item =>
    item.type === 'video'
      ? `<div class="media-thumb" onclick="openMediaByThumb(event,this)">
           <video src="${item.src}" preload="metadata" muted playsinline></video>
           <div class="play-overlay"><div class="play-icon-circle">▶</div></div>
         </div>`
      : `<div class="media-thumb" onclick="openMediaByThumb(event,this)">
           <img src="${item.src}" loading="lazy" alt=""/>
         </div>`
  ).join('');
}

function openMediaByThumb(e, thumbEl) {
  e.stopPropagation();
  const strip = thumbEl.closest('.media-strip');
  const thumbs = Array.from(strip.querySelectorAll('.media-thumb'));
  lightboxIndex = thumbs.indexOf(thumbEl);
  lightboxMedia = thumbs.map(t => {
    const v = t.querySelector('video');
    return v ? { type: 'video', src: v.src } : { type: 'image', src: t.querySelector('img').src };
  });
  showLightbox();
}

function showLightbox() {
  const lb   = document.getElementById('lightbox');
  const img  = document.getElementById('lb-img');
  const vid  = document.getElementById('lb-vid');
  const ctr  = document.getElementById('lb-counter');
  const badge = document.getElementById('lb-badge');
  const prev = document.getElementById('lb-prev');
  const next = document.getElementById('lb-next');

  const item = lightboxMedia[lightboxIndex];
  if (!item) return;

  // Pause/hide previous
  vid.pause();
  img.style.display = 'none';
  vid.style.display = 'none';
  img.classList.remove('lb-anim');
  vid.classList.remove('lb-anim');

  if (item.type === 'video') {
    vid.src = item.src;
    vid.load();
    vid.style.display = 'block';
    void vid.offsetWidth; // reflow to restart animation
    vid.classList.add('lb-anim');
    badge.textContent = '▶ VIDEO';
  } else {
    img.src = item.src;
    img.style.display = 'block';
    void img.offsetWidth;
    img.classList.add('lb-anim');
    badge.textContent = '📷 PHOTO';
  }

  ctr.textContent = `${lightboxIndex + 1} / ${lightboxMedia.length}`;
  const multi = lightboxMedia.length > 1;
  prev.style.display = multi ? 'flex' : 'none';
  next.style.display = multi ? 'flex' : 'none';

  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  const lb  = document.getElementById('lightbox');
  const vid = document.getElementById('lb-vid');
  vid.pause();
  lb.classList.remove('active');
  document.body.style.overflow = '';
}

function lightboxNext(e) {
  if (e) e.stopPropagation();
  lightboxIndex = (lightboxIndex + 1) % lightboxMedia.length;
  showLightbox();
}

function lightboxPrev(e) {
  if (e) e.stopPropagation();
  lightboxIndex = (lightboxIndex - 1 + lightboxMedia.length) % lightboxMedia.length;
  showLightbox();
}

      </div>

      ${day.stretches && day.stretches.length > 0 ? `

              <div class="ex-left">
                <div class="ex-num" style="background:rgba(120,80,220,0.18);color:#a78bfa;font-size:16px;">🧘</div>
                <div>
                  <div class="ex-name-row">
                    <div class="ex-name">${str.name}</div>
                    <button class="copy-btn" style="color:#a78bfa;background:rgba(120,80,220,0.15);" onclick="copyText(event, '${str.name.replace(/'/g,"&#39;")}')" title="Copy">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>

                </div>
              </div>
              <div class="ex-chevron" style="color:#a78bfa;">▾</div>
            </div>
            <div class="ex-body">
              <div class="ex-divider" style="background:rgba(120,80,220,0.2);"></div>
              <div class="machine-block">
                <div class="machine-label" style="background:rgba(120,80,220,0.12);">
                  <div class="machine-label-tag" style="color:#a78bfa;">📍 Location / Equipment</div>
                  <div class="machine-label-name">${str.machine}</div>
                </div>
              </div>
              <div class="tip-block" style="background:rgba(120,80,220,0.08);border-left-color:#a78bfa;">
                <div class="tip-tag" style="color:#a78bfa;">💡 How to stretch</div>
                <div class="tip-text">${str.tip}</div>

              ${renderMediaStrip(str.name)}
            </div>

      <div class="tips-section">
        <div class="tips-box">
          <div class="tips-title">General Tips for Beginners</div>
          ${tips.map(t => `<div class="tip-item">${t}</div>`).join('')}
        </div>
      </div>

      <div class="footer">Tap any exercise to see the machine &amp; tips &nbsp;·&nbsp; Add photos to the <strong>media/</strong> folder</div>
    </div>
  `;
}

function copyText(e, text) {
  e.stopPropagation();
  const btn = e.currentTarget;
  navigator.clipboard.writeText(text).then(() => {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      btn.classList.remove('copied');
    }, 1500);
  });
}

function switchDay(i) {
  activeDay = i;
  openEx = null;
  openStretch = null;
  render();
}

function toggleEx(i) {
  document.getElementById('ex-' + openEx)?.classList.remove('open');
  const closing = openEx === i;
  openEx = closing ? null : i;
  const card = document.getElementById('ex-' + openEx);
  card?.classList.add('open');
  if (!closing && card) setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
}

function toggleStretch(i) {
  document.getElementById('str-' + openStretch)?.classList.remove('open');
  const closing = openStretch === i;
  openStretch = closing ? null : i;
  const card = document.getElementById('str-' + openStretch);
  card?.classList.add('open');
  if (!closing && card) setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
}

// ── Lightbox touch/keyboard ────────────────────────────────────────
(function() {
  const lb = document.getElementById('lightbox');

  lb.addEventListener('touchstart', e => {
    lbTouchX = e.touches[0].clientX;
  }, { passive: true });

  lb.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - lbTouchX;
    if (Math.abs(dx) > 48) {
      if (dx > 0) lightboxPrev();
      else lightboxNext();
    }
  }, { passive: true });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('active')) return;
    if (e.key === 'Escape')      closeLightbox();
    else if (e.key === 'ArrowRight') lightboxNext();
    else if (e.key === 'ArrowLeft')  lightboxPrev();
  });
})();

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
