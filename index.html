<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Punit's Gym Plan</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json"/>
<meta name="theme-color" content="#8B5CF6"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Gym Plan"/>
<link rel="apple-touch-icon" href="./icons/icon-192.png"/>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080810;
    --card: #10101e;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f8;
    --muted: rgba(240,240,248,0.45);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: -webkit-fill-available; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior-y: none;
  }

  /* HEADER */
  .header {
    background: #080215;
    padding: max(46px, calc(var(--safe-top) + 22px)) 20px 16px;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid rgba(139,92,246,0.15);
  }
  /* Dot grid */
  .header::before {
    content:''; position:absolute; inset:0; pointer-events:none;
    background-image: radial-gradient(circle, rgba(139,92,246,0.09) 1px, transparent 1px);
    background-size: 26px 26px;
    -webkit-mask-image: radial-gradient(ellipse 100% 85% at 50% 20%, black 20%, transparent 80%);
    mask-image: radial-gradient(ellipse 100% 85% at 50% 20%, black 20%, transparent 80%);
  }
  /* Glows */
  .header::after {
    content:''; position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(ellipse 60% 65% at 20% 35%, rgba(109,40,217,0.32) 0%, transparent 65%),
      radial-gradient(ellipse 38% 38% at 92% 85%, rgba(255,107,53,0.13) 0%, transparent 65%);
  }
  .header-content { position:relative; z-index:1; }
  /* Eyebrow */
  .header-eyebrow { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .header-eyebrow-dot {
    width:7px; height:7px; border-radius:50%; flex-shrink:0;
    background:#8B5CF6; box-shadow:0 0 10px rgba(139,92,246,0.7);
  }
  .header-eyebrow-text { font-size:10px; letter-spacing:4px; text-transform:uppercase; font-weight:700; color:rgba(255,255,255,0.38); }
  /* Horizontal split: title left, info right */
  .header-main { display:flex; align-items:flex-end; gap:0; }
  /* Main title */
  .header-title { font-family:'Bebas Neue',sans-serif; line-height:0.88; letter-spacing:1px; flex-shrink:0; }
  .header-title-top { font-size:clamp(38px,10vw,54px); color:rgba(255,255,255,0.93); display:block; }
  .header-title-bot {
    font-size:clamp(38px,10vw,54px); display:block;
    background:linear-gradient(100deg,#8B5CF6 0%,#c084fc 45%,#FF6B35 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  /* Right aside column */
  .header-aside {
    flex:1; min-width:0;
    display:flex; flex-direction:column; justify-content:flex-end; gap:7px;
    padding-left:14px; padding-bottom:2px;
    border-left:1px solid rgba(139,92,246,0.2);
    margin-left:16px;
  }
  /* Left purple stripe */
  .hd-stripe {
    position:absolute; left:0; top:0; bottom:0; width:3px;
    pointer-events:none; z-index:2;
    background:linear-gradient(to bottom,#8B5CF6 0%,rgba(139,92,246,0.3) 60%,transparent 100%);
  }
  /* Right hexagon */
  .hd-hex {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    width:62px; height:70px;
    pointer-events:none; z-index:0; overflow:visible; opacity:0.7;
  }
  /* Faint background number */
  .hd-bg-num {
    position:absolute; right:-8px; top:50%; transform:translateY(-50%);
    font-family:'Bebas Neue',sans-serif; font-size:clamp(170px,42vw,240px);
    line-height:1; color:transparent; pointer-events:none; user-select:none; z-index:0;
    -webkit-text-stroke:1px rgba(255,255,255,0.04);
  }
  /* Date bar */
  .header-date-bar {
    display:flex; align-items:center; gap:7px;
    padding:0; margin:0;
  }
  .header-pulse {
    width:7px; height:7px; border-radius:50%; flex-shrink:0;
    background:#a78bfa; box-shadow:0 0 8px rgba(139,92,246,0.6);
  }
  .hd-quote {
    font-size:11px; font-style:italic; letter-spacing:0.2px;
    color:rgba(255,255,255,0.28); margin:0; line-height:1.4;
  }
  .header-date-text { font-size:11px; color:rgba(255,255,255,0.4); font-weight:500; letter-spacing:0.3px; }

  /* DAY TABS */
  .tabs {
    display:flex; overflow-x:auto; gap:7px;
    padding:12px 14px;
    scrollbar-width:none;
    position:sticky; top:0; z-index:100;
    background:rgba(8,2,21,0.92);
    backdrop-filter:blur(24px) saturate(160%);
    -webkit-backdrop-filter:blur(24px) saturate(160%);
    border-bottom:1px solid rgba(139,92,246,0.12);
  }
  .tabs::-webkit-scrollbar { display:none; }
  .tab {
    flex-shrink:0;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:10px 12px 9px;
    min-width:58px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.06);
    background:rgba(255,255,255,0.03);
    color:rgba(255,255,255,0.3); cursor:pointer;
    font-family:'DM Sans',sans-serif; font-weight:700;
    font-size:10px; letter-spacing:0.5px; text-transform:uppercase;
    transition:all 0.2s;
    -webkit-user-select:none; user-select:none;
  }
  .tab.active {
    background:linear-gradient(145deg,rgba(var(--accent-rgb),0.28) 0%,rgba(var(--accent-rgb),0.1) 100%);
    border-color:rgba(var(--accent-rgb),0.5);
    color:var(--accent);
    box-shadow:0 4px 18px rgba(var(--accent-rgb),0.22), inset 0 1px 0 rgba(var(--accent-rgb),0.25);
  }
  .tab-icon { font-size:20px; display:block; }

  /* DAY HERO */
  /* DAY HERO — ticket style */
  .day-hero {
    --pb: 0%;
    margin:14px 16px 0;
    border-radius:16px;
    border:1px solid rgba(var(--accent-rgb),0.22);
    background:rgba(var(--accent-rgb),0.04);
    position:relative; overflow:hidden;
    transition:border-color 0.4s;
  }
  /* Background progress fill */
  .day-hero::before {
    content:''; position:absolute; top:0; left:0; bottom:0;
    width:var(--pb);
    background:linear-gradient(90deg,rgba(var(--accent-rgb),0.26) 0%,rgba(var(--accent-rgb),0.09) 80%,transparent 100%);
    transition:width 0.5s cubic-bezier(.4,0,.2,1);
    pointer-events:none; z-index:0;
  }
  .day-hero.hero-done { border-color:rgba(var(--accent-rgb),0.65); }
  .day-hero-body { padding:16px; position:relative; z-index:1; }
  .day-hero-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .day-tag { font-size:10px; color:var(--accent); font-weight:700; letter-spacing:3px; text-transform:uppercase; }
  .day-progress-count { font-size:11px; color:rgba(255,255,255,0.28); }
  .day-progress-count b { color:var(--accent); font-weight:700; font-size:13px; }
  .day-title { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:1px; line-height:1; }
  /* EXERCISE CARDS */
  .exercises { padding:12px 16px; display:flex; flex-direction:column; gap:10px; }
  .ex-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; overflow:hidden; cursor:pointer;
    transition:border-color 0.2s, background 0.2s;
    -webkit-user-select:none; user-select:none;
  }
  .ex-card.open { border-color:rgba(var(--accent-rgb),0.5); background:rgba(255,255,255,0.06); }
  .ex-header { padding:16px 16px; display:flex; align-items:center; justify-content:space-between; min-height:66px; }
  .ex-left { display:flex; align-items:center; gap:12px; flex:1; min-width:0; }
  .ex-num {
    width:36px; height:36px; border-radius:10px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:13px;
    background:rgba(var(--accent-rgb),0.18); color:var(--accent);
  }
  .ex-name-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .ex-name { font-weight:700; font-size:16px; line-height:1.3; }
  .copy-btn {
    background:rgba(var(--accent-rgb),0.15); border:none; border-radius:7px;
    padding:7px 8px; cursor:pointer; color:var(--accent);
    font-family:'DM Sans',sans-serif; flex-shrink:0;
    transition:background 0.2s, color 0.2s;
    min-width:34px; min-height:34px; display:flex; align-items:center; justify-content:center;
  }
  .copy-btn:active { background:rgba(var(--accent-rgb),0.3); }
  .copy-btn.copied { color:#4ECDC4; background:rgba(78,205,196,0.15); }
  .ex-meta { color:var(--muted); font-size:13px; margin-top:3px; }

  /* EXPANDED CONTENT */
  .ex-body { display:none; padding:0 16px 16px; }
  .ex-card.open .ex-body { display:block; }
  .ex-divider { height:1px; background:rgba(var(--accent-rgb),0.2); margin-bottom:14px; }

  /* MEDIA THUMBNAIL STRIP */
  .media-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
    margin-top: 12px;
    margin-bottom: 0;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x mandatory;
  }
  .media-strip::-webkit-scrollbar { display: none; }

  .media-thumb {
    flex-shrink: 0;
    width: 88px;
    height: 88px;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid var(--border);
    scroll-snap-align: start;
    transition: transform 0.12s, border-color 0.15s;
  }
  .media-thumb:active { transform: scale(0.93); }
  .media-thumb img, .media-thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .media-thumb .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.38);
  }
  .play-icon-circle {
    width: 30px;
    height: 30px;
    background: rgba(255,255,255,0.92);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #111;
    padding-left: 2px;
  }
  .media-more-thumb {
    flex-shrink: 0;
    width: 88px;
    height: 88px;
    border-radius: 12px;
    border: 1.5px dashed var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: var(--muted);
    font-size: 22px;
    cursor: default;
  }
  .media-more-thumb span { font-size: 11px; font-weight: 700; letter-spacing: 1px; }

  .machine-block { border-radius:12px; overflow:hidden; margin-bottom:10px; }
  .machine-label {
    background:rgba(var(--accent-rgb),0.15); border-radius:12px;
    padding:12px 14px;
  }
  .machine-label-tag { font-size:10px; color:var(--accent); font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:3px; }
  .machine-label-name { font-size:14px; font-weight:700; }

  .tip-block {
    background:rgba(var(--accent-rgb),0.1);
    border-left:3px solid var(--accent);
    border-radius:0 10px 10px 0;
    padding:12px 14px;
  }
  .tip-tag { font-size:10px; color:var(--accent); font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:4px; }
  .tip-text { font-size:13px; color:rgba(240,240,248,0.75); line-height:1.65; }

  /* TIPS SECTION */
  .tips-section { padding:8px 16px 24px; }
  .tips-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; }
  .tips-title { font-size:11px; color:#FF6B35; font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:14px; }
  .tip-item { font-size:13px; color:var(--muted); padding:10px 12px; background:rgba(255,255,255,0.04); border-radius:8px; margin-bottom:6px; line-height:1.5; }

  .footer {
    text-align:center;
    padding:12px 16px;
    padding-bottom: max(16px, calc(var(--safe-bottom) + 8px));
    color:rgba(255,255,255,0.18);
    font-size:11px;
  }

  /* STRETCH SECTION */
  .stretch-section-header {
    margin: 4px 16px 0;
    padding: 14px 16px;
    border-radius: 14px;
    background: rgba(120,80,220,0.1);
    border: 1px solid rgba(120,80,220,0.25);
    display: flex; justify-content: space-between; align-items: center;
  }
  .stretch-header-tag { font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:#a78bfa; }
  .stretch-header-sub { font-size:12px; color:var(--muted); }
  .stretch-card.open { border-color:rgba(120,80,220,0.5); }
  .stretch-card .ex-num { background:rgba(120,80,220,0.18); color:#a78bfa; font-size:16px; }
  .stretch-card .copy-btn { color:#a78bfa; background:rgba(120,80,220,0.15); }
  .stretch-card .ex-divider { background:rgba(120,80,220,0.2); }
  .stretch-card .machine-label { background:rgba(120,80,220,0.12); }
  .stretch-card .machine-label-tag { color:#a78bfa; }
  .stretch-card .tip-block { background:rgba(120,80,220,0.08); border-left-color:#a78bfa; }
  .stretch-card .tip-tag { color:#a78bfa; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .day-content { animation: fadeIn 0.3s ease; }

  /* ─── LIGHTBOX ─── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
    overscroll-behavior: none;
  }
  .lightbox.active {
    opacity: 1;
    pointer-events: all;
  }
  .lightbox-media-wrap {
    max-width: 100%;
    max-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 72px 16px max(72px, calc(var(--safe-bottom) + 56px));
  }
  .lightbox-media-wrap img {
    max-width: calc(100vw - 32px);
    max-height: calc(100dvh - 144px);
    border-radius: 14px;
    object-fit: contain;
    display: none;
  }
  .lightbox-media-wrap video {
    max-width: calc(100vw - 32px);
    max-height: calc(100dvh - 144px);
    border-radius: 14px;
    display: none;
    background: #000;
  }
  .lightbox-close {
    position: fixed;
    top: max(18px, calc(var(--safe-top) + 10px));
    right: max(16px, var(--safe-right));
    width: 46px; height: 46px;
    background: rgba(255,255,255,0.13);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 50%;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10001;
    font-family: 'DM Sans', sans-serif; font-weight: 700;
    -webkit-user-select:none; user-select:none;
    transition: background 0.15s;
  }
  .lightbox-close:active { background: rgba(255,255,255,0.25); }
  .lightbox-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.13);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 50%;
    color: #fff;
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10001;
    -webkit-user-select:none; user-select:none;
    transition: background 0.15s;
  }
  .lightbox-nav:active { background: rgba(255,255,255,0.28); }
  .lightbox-prev { left: max(12px, var(--safe-left)); }
  .lightbox-next { right: max(12px, var(--safe-right)); }
  .lightbox-counter {
    position: fixed;
    bottom: max(28px, calc(var(--safe-bottom) + 16px));
    left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.82);
    font-size: 13px; font-weight: 600;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 7px 18px;
    border-radius: 20px;
    white-space: nowrap;
    z-index: 10001;
  }
  .lightbox-badge {
    position: fixed;
    top: max(18px, calc(var(--safe-top) + 10px));
    left: max(16px, var(--safe-left));
    font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 6px 12px;
    border-radius: 8px;
    z-index: 10001;
  }
  @keyframes lbPop { from{opacity:0;transform:scale(0.93)} to{opacity:1;transform:scale(1)} }
  .lb-anim { animation: lbPop 0.18s ease; }

  /* ── Checkmark button ── */
  .ex-check {
    width:30px; height:30px; border-radius:9px; flex-shrink:0;
    border:1.5px solid rgba(255,255,255,0.13); background:transparent;
    color:transparent; cursor:pointer; margin-right:8px;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.22s cubic-bezier(.4,0,.2,1);
    -webkit-tap-highlight-color:transparent;
  }
  .ex-check.done {
    background:linear-gradient(135deg,var(--accent),rgba(var(--accent-rgb),0.65));
    border-color:transparent; color:#fff;
    box-shadow:0 0 14px rgba(var(--accent-rgb),0.45);
    transform:scale(1.08);
  }
  .stretch-card .ex-check:not(.done) { border-color:rgba(120,80,220,0.3); }
  .stretch-card .ex-check.done { background:linear-gradient(135deg,#a78bfa,rgba(120,80,220,0.65)); box-shadow:0 0 14px rgba(120,80,220,0.45); }

  /* ── Log section ── */
  .ex-log { margin-top:14px; background:rgba(255,255,255,0.04); border-radius:12px; padding:12px; border:1px solid rgba(255,255,255,0.07); }
  .log-title { font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--accent); margin-bottom:10px; }
  .log-fields { display:flex; gap:10px; }
  .log-field { flex:1; display:flex; flex-direction:column; gap:5px; }
  .log-field label { font-size:11px; color:var(--muted); font-weight:500; }
  .log-field input {
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
    border-radius:8px; padding:8px 10px; color:#fff; font-size:14px;
    outline:none; width:100%; box-sizing:border-box;
    -webkit-appearance:none; appearance:none;
  }
  .log-field input:focus { border-color:var(--accent); background:rgba(255,255,255,0.09); }
  .log-field input::placeholder { color:rgba(255,255,255,0.22); }

  /* ── Kebab menu ── */
  .menu-btn {
    position:absolute; top:max(14px,calc(var(--safe-top) + 10px)); right:16px;
    width:36px; height:36px; border-radius:50%;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12);
    color:rgba(255,255,255,0.75); cursor:pointer; z-index:200;
    display:flex; align-items:center; justify-content:center;
    -webkit-tap-highlight-color:transparent; transition:background 0.15s;
  }
  .menu-btn:active { background:rgba(255,255,255,0.18); }
  .menu-popover {
    position:absolute; top:max(58px,calc(var(--safe-top) + 54px)); right:12px;
    background:#1c1c32; border:1px solid rgba(255,255,255,0.1);
    border-radius:14px; padding:6px; min-width:190px;
    box-shadow:0 12px 40px rgba(0,0,0,0.5); z-index:201;
    display:none; animation:menuPop 0.15s ease;
  }
  .menu-popover.open { display:block; }
  @keyframes menuPop { from{opacity:0;transform:scale(0.95) translateY(-4px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .menu-item {
    display:flex; align-items:center; gap:12px;
    padding:13px 14px; border-radius:10px;
    color:rgba(255,255,255,0.85); font-size:14px; font-weight:500;
    cursor:pointer; transition:background 0.12s;
    -webkit-tap-highlight-color:transparent;
  }

function nameToSlug(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

// Returns the strip HTML. Already-probed exercises render inline; new ones
// get an invisible placeholder that fills in once HEAD probes complete.
function renderMediaStrip(exName) {
  const slug = nameToSlug(exName);
  const id = 'ms-' + slug;
  if (mediaCache[slug] !== undefined) return buildStripHTML(id, mediaCache[slug]);
  probeMedia(slug, id); // fires async, updates DOM when done
  return `<div class="media-strip" id="${id}" style="display:none;margin:0;"></div>`;
}

// file:// blocks fetch — use element-based probing locally, fetch HEAD on https://
const isFileProtocol = location.protocol === 'file:';

function chkFile(src) {
  const ext = src.split('.').pop();
  if (ext === 'jpg' || ext === 'jpeg') {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve(src);
      img.onerror = () => resolve(null);
      img.src = src;
    });
  }
  return new Promise(resolve => {
    const v = document.createElement('video');
    v.onloadedmetadata = () => resolve(src);
    v.onerror = () => resolve(null);
    v.src = src; v.load();
    setTimeout(() => resolve(null), 800);
  });
}

function chkFetch(src) {
  return fetch(src, { method: 'HEAD' }).then(r => r.ok ? src : null).catch(() => null);
}

async function probeMedia(slug, id) {
  const found = [];
  const chk = isFileProtocol ? chkFile : chkFetch;

  for (let i = 1; i <= MEDIA_MAX; i++) {
    const [jpg, mp4, mov] = await Promise.all([
      chk(`media/${slug}-${i}.jpg`),
      chk(`media/${slug}-${i}.mp4`),
      chk(`media/${slug}-${i}.mov`),
    ]);
    if (!jpg && !mp4 && !mov) break;
    if (jpg) found.push({ type: 'image', src: jpg });
    if (mp4) found.push({ type: 'video', src: mp4 });
    if (mov) found.push({ type: 'video', src: mov });
  }

  mediaCache[slug] = found;
  try { sessionStorage.setItem('gymMediaCache_v3', JSON.stringify(mediaCache)); } catch {}

  const strip = document.getElementById(id);
  if (!strip) return;
  if (!found.length) { strip.remove(); return; }
  strip.removeAttribute('style');
  strip.innerHTML = thumbsHTML(found);
}

function buildStripHTML(id, found) {
  if (!found.length) return '';
  return `<div class="media-strip" id="${id}">${thumbsHTML(found)}</div>`;
}

function thumbsHTML(items) {
  return items.map(item =>
    item.type === 'video'
      ? `<div class="media-thumb" onclick="openMediaByThumb(event,this)">
           <video src="${item.src}" preload="metadata" muted playsinline></video>
           <div class="play-overlay"><div class="play-icon-circle">▶</div></div>
         </div>`
      : `<div class="media-thumb" onclick="openMediaByThumb(event,this)">
           <img src="${item.src}" loading="lazy" alt=""/>
         </div>`
  ).join('');
}

function openMediaByThumb(e, thumbEl) {
  e.stopPropagation();
  const strip = thumbEl.closest('.media-strip');
  const thumbs = Array.from(strip.querySelectorAll('.media-thumb'));
  lightboxIndex = thumbs.indexOf(thumbEl);
  lightboxMedia = thumbs.map(t => {
    const v = t.querySelector('video');
    return v ? { type: 'video', src: v.src } : { type: 'image', src: t.querySelector('img').src };
  });
  showLightbox();
}

function showLightbox() {
  const lb   = document.getElementById('lightbox');
  const img  = document.getElementById('lb-img');
  const vid  = document.getElementById('lb-vid');
  const ctr  = document.getElementById('lb-counter');
  const badge = document.getElementById('lb-badge');
  const prev = document.getElementById('lb-prev');
  const next = document.getElementById('lb-next');

  const item = lightboxMedia[lightboxIndex];
  if (!item) return;

  // Pause/hide previous
  vid.pause();
  img.style.display = 'none';
  vid.style.display = 'none';
  img.classList.remove('lb-anim');
  vid.classList.remove('lb-anim');

  if (item.type === 'video') {
    vid.src = item.src;
    vid.load();
    vid.style.display = 'block';
    void vid.offsetWidth; // reflow to restart animation
    vid.classList.add('lb-anim');
    badge.textContent = '▶ VIDEO';
  } else {
    img.src = item.src;
    img.style.display = 'block';
    void img.offsetWidth;
    img.classList.add('lb-anim');
    badge.textContent = '📷 PHOTO';
  }

  ctr.textContent = `${lightboxIndex + 1} / ${lightboxMedia.length}`;
  const multi = lightboxMedia.length > 1;
  prev.style.display = multi ? 'flex' : 'none';
  next.style.display = multi ? 'flex' : 'none';

  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  const lb  = document.getElementById('lightbox');
  const vid = document.getElementById('lb-vid');
  vid.pause();
  lb.classList.remove('active');
  document.body.style.overflow = '';
  lbTouchX = 0;
}

function lightboxNext(e) {
  if (e) e.stopPropagation();
  lightboxIndex = (lightboxIndex + 1) % lightboxMedia.length;
  showLightbox();
}

function lightboxPrev(e) {
  if (e) e.stopPropagation();
  lightboxIndex = (lightboxIndex - 1 + lightboxMedia.length) % lightboxMedia.length;
  showLightbox();
}

// ── Render ─────────────────────────────────────────────────────────
function render() {
  const day = days[activeDay];
  document.documentElement.style.setProperty('--accent', day.accent);
  document.documentElement.style.setProperty('--accent-rgb', day.accentRgb);

  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = days.map((d, i) => `
    <button class="tab ${i === activeDay ? 'active' : ''}"
      ${i === activeDay ? `style="--accent:${d.accent};--accent-rgb:${d.accentRgb}"` : ''}
      onclick="switchDay(${i})">
      <span class="tab-icon">${d.icon}</span>
      ${d.day.slice(0,3)}
    </button>
  `).join('');

  tabsEl.querySelector('.tab.active')?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

  document.getElementById('content').innerHTML = `
    <div class="day-content">
      <div class="day-hero" id="day-hero">
        <div class="day-hero-body">
          <div class="day-hero-top">
            <div class="day-tag">${day.tag}</div>
            <div class="day-progress-count"><b id="pb-done">0</b> / ${day.exercises.length + (day.stretches||[]).length}</div>
          </div>
          <div class="day-title">${day.icon} ${day.focus}</div>
        </div>
      </div>

      <div class="exercises">
        ${day.exercises.map((ex, i) => `
          <div class="ex-card ${cardState.ex === i ? 'open' : ''}" id="ex-${i}" onclick="toggleCard('ex',${i})">
            <div class="ex-header">
              <div class="ex-left">
                <div class="ex-num">${i === 0 ? '🔥' : i+1}</div>
                <div>
                  <div class="ex-name-row">
                    <div class="ex-name">${ex.name}</div>
                    <button class="copy-btn" onclick="copyText(event, '${ex.name.replace(/'/g,"&#39;")}')" title="Copy">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>
                  </div>
                  <div class="ex-meta">${ex.sets} &nbsp;·&nbsp; ${ex.reps}</div>
                </div>
              </div>
              <button class="ex-check ${gymLog[today]?.exercises?.[day.day+'::'+ex.name]?.done ? 'done' : ''}" onclick="toggleDone(event,${i},'ex')">✓</button>
            </div>
            <div class="ex-body">
              <div class="ex-divider"></div>
              <div class="machine-block">
                <div class="machine-label">
                  <div class="machine-label-tag">💪 Machine / Equipment</div>
                  <div class="machine-label-name">${ex.machine}</div>
                </div>
              </div>
              <div class="tip-block">
                <div class="tip-tag">💡 Beginner Tip</div>
                <div class="tip-text">${ex.tip}</div>
              </div>
              ${renderMediaStrip(ex.name)}
              ${renderLogFields(ex, i)}
            </div>
          </div>`
        ).join('')}
      </div>

      ${day.stretches && day.stretches.length > 0 ? `
      <div class="stretch-section-header">
        <div>
          <div class="stretch-header-tag">🧘 Post-Workout Stretching</div>
          <div class="stretch-header-sub">Hold each stretch · release tension · improve flexibility</div>
        </div>
        <div style="font-size:12px;font-weight:700;color:rgba(167,139,250,0.6);">${day.stretches.length} stretches</div>
      </div>
      <div class="exercises">
        ${day.stretches.map((str, i) => `
          <div class="ex-card stretch-card ${cardState.str === i ? 'open' : ''}" id="str-${i}" onclick="toggleCard('str',${i})">
            <div class="ex-header">
              <div class="ex-left">
                <div class="ex-num">🧘</div>
                <div>
                  <div class="ex-name-row">
                    <div class="ex-name">${str.name}</div>
                    <button class="copy-btn" onclick="copyText(event, '${str.name.replace(/'/g,"&#39;")}')" title="Copy">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>
                  </div>
                  <div class="ex-meta">${str.sets} &nbsp;·&nbsp; ${str.reps}</div>
                </div>
              </div>
              <button class="ex-check ${gymLog[today]?.exercises?.[day.day+'::'+str.name]?.done ? 'done' : ''}" onclick="toggleDone(event,${i},'str')">✓</button>
            </div>
            <div class="ex-body">
              <div class="ex-divider"></div>
              <div class="machine-block">
                <div class="machine-label">
                  <div class="machine-label-tag">📍 Location / Equipment</div>
                  <div class="machine-label-name">${str.machine}</div>
                </div>
              </div>
              <div class="tip-block">
                <div class="tip-tag">💡 How to stretch</div>
                <div class="tip-text">${str.tip}</div>
              </div>
              ${renderMediaStrip(str.name)}
            </div>
          </div>`
        ).join('')}
      </div>
      ` : ''}

      <div class="tips-section">
        <div class="tips-box">
          <div class="tips-title">General Tips for Beginners</div>
          ${tips.map(t => `<div class="tip-item">${t}</div>`).join('')}
        </div>
      </div>

      <div class="footer"></div>
    </div>
  `;
  dayHeroEl = document.getElementById('day-hero');
  pbDone    = document.getElementById('pb-done');
  updateProgress();
}

function copyText(e, text) {
  e.stopPropagation();
  const btn = e.currentTarget;
  navigator.clipboard.writeText(text).then(() => {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      btn.classList.remove('copied');
    }, 1500);
  });
}

function switchDay(i) {
  activeDay = i;
  cardState.ex = null;
  cardState.str = null;
  render();
}

function toggleCard(type, i) {
  document.getElementById(`${type}-${cardState[type]}`)?.classList.remove('open');
  const closing = cardState[type] === i;
  cardState[type] = closing ? null : i;
  const card = document.getElementById(`${type}-${cardState[type]}`);
  card?.classList.add('open');
  if (!closing && card) requestAnimationFrame(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }));
}

// ── Lightbox touch/keyboard ────────────────────────────────────────
(function() {
  const lb = document.getElementById('lightbox');

  lb.addEventListener('touchstart', e => {
    lbTouchX = e.touches[0].clientX;
  }, { passive: true });

  lb.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - lbTouchX;
    if (Math.abs(dx) > 48) {
      if (dx > 0) lightboxPrev();
      else lightboxNext();
    }
  }, { passive: true });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('active')) return;
    if (e.key === 'Escape')      closeLightbox();
    else if (e.key === 'ArrowRight') lightboxNext();
    else if (e.key === 'ArrowLeft')  lightboxPrev();
  });
})();

document.addEventListener('click', closeMenu);

// ── Progress log (localStorage) ───────────────────────────────────
const today = new Date().toISOString().slice(0, 10);
let gymLog = {};
try { gymLog = JSON.parse(localStorage.getItem('gymLog') || '{}'); } catch {}

function saveLog() {
  try { localStorage.setItem('gymLog', JSON.stringify(gymLog)); } catch {}
}

function exKey(exName) {
  return `${days[activeDay].day}::${exName}`;
}

function getExLog(exName) {
  const key = exKey(exName);
  if (!gymLog[today]) gymLog[today] = { day: days[activeDay].day, exercises: {} };
  if (!gymLog[today].exercises[key]) gymLog[today].exercises[key] = {};
  return gymLog[today].exercises[key];
}

function toggleDone(e, idx, type) {
  e.stopPropagation();
  const arr = type === 'str' ? days[activeDay].stretches : days[activeDay].exercises;
  const log = getExLog(arr[idx].name);
  log.done = !log.done;
  saveLog();
  e.currentTarget.classList.toggle('done', log.done);
  updateProgress();
}

function saveExLog(idx, field, value) {
  const exName = days[activeDay].exercises[idx].name;
  const log = getExLog(exName);
  log[field] = value;
  saveLog();
}

function updateProgress() {
  const day = days[activeDay];
  const allNames = [
    ...day.exercises.map(e => e.name),
    ...(day.stretches || []).map(s => s.name),
  ];
  const total = allNames.length;
  const done = allNames.filter(n => gymLog[today]?.exercises?.[exKey(n)]?.done).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  if (dayHeroEl) {
    dayHeroEl.style.setProperty('--pb', pct + '%');
    dayHeroEl.classList.toggle('hero-done', pct === 100);
  }
  if (pbDone) pbDone.textContent = done;
}

function toggleMenu(e) {
  e.stopPropagation();
  document.getElementById('menu-popover').classList.toggle('open');
}
function closeMenu() {
  document.getElementById('menu-popover').classList.remove('open');
}

function exportLog() {
  if (!Object.keys(gymLog).length) {
    alert('No log data yet — check off some exercises first!');
    return;
  }
  const blob = new Blob([JSON.stringify(gymLog, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gym-log-${today}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
